<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高频同义替换与学术词汇</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="vocabulary_data.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background: #0a1028;
            background-image: radial-gradient(circle at 50% 50%, #1a2345 0%, #050714 100%);
            color: #e6edf7;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            background: rgba(18, 28, 58, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(100, 120, 255, 0.2);
            padding: 40px;
            border: 1px solid rgba(130, 150, 255, 0.2);
        }

        h1 {
            text-align: center;
            color: #c7d1ff;
            text-shadow: 0 0 15px rgba(130, 150, 255, 0.5);
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #6a85ff, #4a6cff);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: linear-gradient(90deg, #5a75ff, #3a5cff);
            transform: scale(1.05);
        }

        select {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(130, 150, 255, 0.3);
            background: rgba(26, 35, 69, 0.7);
            color: #e6edf7;
            font-size: 15px;
            outline: none;
            min-width: 140px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg xmlns="http://www.w3.org/2000/svg" width="292.4" height="292.4"%3E%3Cpath fill="%23ffffff" d="M287 69.4a17.6 17.6 0 0 0-13-5.4H18.4c-5 0-9.3 1.8-12.9 5.4A17.6 17.6 0 0 0 0 82.2c0 5 1.8 9.3 5.4 12.9l128 127.9c3.6 3.6 7.8 5.4 12.8 5.4s9.2-1.8 12.8-5.4L287 95c3.5-3.5 5.4-7.8 5.4-12.8 0-5-1.9-9.2-5.5-12.8z"/%3E%3C/svg%3E');
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 10px;
            padding-right: 30px;
        }

        select:hover {
            border-color: rgba(130, 150, 255, 0.5);
        }

        select:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(106, 133, 255, 0.5);
        }

        select option {
            background-color: #1a2345 !important;
            color: white !important;
            padding: 10px;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        select option:hover {
            background-color: #3a5cff !important;
        }

        select option:checked {
            background-color: #4a6cff !important;
        }

        /* 为下拉菜单添加圆角和过渡效果 */
        select::-webkit-scrollbar {
            width: 8px;
        }

        select::-webkit-scrollbar-track {
            background: #1a2345;
            border-radius: 4px;
        }

        select::-webkit-scrollbar-thumb {
            background: #4a6cff;
            border-radius: 4px;
        }

        select::-webkit-scrollbar-thumb:hover {
            background: #6a85ff;
        }

        button.active {
            background: linear-gradient(90deg, #5fff97, #3bff7f);
            color: #0e2212;
        }

        .group {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(26, 35, 69, 0.5);
            border: 1px solid rgba(130, 150, 255, 0.2);
            border-radius: 12px;
        }

        .unit h2 {
            color: #c7d1ff;
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(130, 150, 255, 0.3);
        }

        .group h3 {
            color: #aabbff;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .word-count {
            font-size: 14px;
            color: #aabbff;
            font-weight: normal;
        }

        .word-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }

        .word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(26, 35, 69, 0.3);
            border: 1px solid rgba(130, 150, 255, 0.1);
            border-radius: 8px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .word-item:hover {
            background: rgba(26, 35, 69, 0.6);
            transform: translateY(-2px);
        }

        .word-item.starred {
            background: rgba(255, 185, 87, 0.2);
            border-color: rgba(255, 185, 87, 0.4);
        }

        .word-item.starred-double {
            background: rgba(255, 128, 74, 0.2);
            border-color: rgba(255, 128, 74, 0.4);
        }

        .word-en {
            font-weight: bold;
            color: #d6e0ff;
        }

        .word-cn {
            color: #aabbff;
        }

        .word-cn.hidden {
            opacity: 0;
            transition: opacity 0.3s;
        }

        .star-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #6677cc;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }

        .star-btn.starred {
            color: #ffb957;
        }

        .star-btn.starred-double {
            color: #ff804a;
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section label {
            margin-right: 10px;
            color: #aabbff;
        }

        .special-section {
            margin: 30px 0;
            padding: 20px;
            background: rgba(26, 35, 69, 0.5);
            border: 1px solid rgba(130, 150, 255, 0.2);
            border-radius: 12px;
            text-align: center;
        }

        .special-section h3 {
            color: #c7d1ff;
            margin-bottom: 15px;
        }

        .special-section button {
            background: linear-gradient(90deg, #8899ff, #6677cc);
            margin: 0 10px;
        }

        .special-section button:hover {
            background: linear-gradient(90deg, #7788ee, #5566bb);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 12px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
            font-weight: 500;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 1;
            visibility: visible;
        }

        .back-btn::after {
            content: '‹';
            font-size: 16px;
            font-weight: bold;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #ffed4e, #ffd700);
            transform: translateX(3px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.6);
        }

        /* 滚动隐藏/显示效果 */
        .back-btn.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateX(-20px);
        }
    </style>
</head>
<body>
    <script>applyConfig();</script>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='index.html'">返回</button>
        <h1>高频同义替换与学术词汇</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="unit-select">单元选择：</label>
                <select id="unit-select">
                    <option value="all">全部单元</option>
                    <option value="0">第一单元</option>
                    <option value="1">第二单元</option>
                    <option value="2">第三单元</option>
                    <option value="3">第四单元</option>
                    <option value="4">第五单元</option>
                    <option value="5">第六单元</option>
                    <option value="6">第七单元</option>
                    <option value="7">第八单元</option>
                    <option value="8">第九单元</option>
                    <option value="9">第十单元</option>
                </select>
            </div>
            <div class="control-group">
                <label for="mode">学习模式：</label>
                <button id="mode-normal" class="active">正常模式</button>
                <button id="mode-hide-cn">隐藏中文</button>
            </div>
            <div class="control-group">
                <label for="filter">过滤：</label>
                <button id="filter-all" class="active">全部</button>
                <button id="filter-starred">带星词汇</button>
                <button id="filter-starred-single">单星词汇</button>
                <button id="filter-starred-double">双星词汇</button>
            </div>
            <div class="control-group">
                <button id="reset-stars">重置星标</button>
            </div>
        </div>
        

        
        <div id="vocabulary-container"></div>
    </div>
    
    <script>
        // 全局变量
        let currentUnit = 'all';
        let currentMode = 'normal';
        let currentFilter = 'all';

        // 本地存储功能 - 使用统一存储结构
        const STORAGE_KEY = 'ielts_learning_system';
        
        function getStorageData() {
            try {
                let d = localStorage.getItem(STORAGE_KEY);
                return d ? JSON.parse(d) : {
                    ebbinghaus: {
                        masterMap: {},
                        stats: {totalError: 0, totalMaster: 0},
                        errors: [],
                        memory: {}
                    },
                    synonyms: {
                        starred: {}
                    },
                    microbe: {
                        starred: {}
                    }
                };
            } catch (error) {
                console.error('Error getting storage data:', error);
                return {
                    ebbinghaus: {
                        masterMap: {},
                        stats: {totalError: 0, totalMaster: 0},
                        errors: [],
                        memory: {}
                    },
                    synonyms: {
                        starred: {}
                    },
                    microbe: {
                        starred: {}
                    }
                };
            }
        }
        
        function setStorageData(data) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                return true;
            } catch (error) {
                console.error('Error setting storage data:', error);
                return false;
            }
        }
        
        function getStarredWords() {
            const data = getStorageData();
            return data.synonyms.starred || {};
        }

        function saveStarredWords(starred) {
            const data = getStorageData();
            data.synonyms.starred = starred;
            return setStorageData(data);
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderVocabulary();
            setupEventListeners();
        });

        // 渲染词汇
        function renderVocabulary() {
            const container = document.getElementById('vocabulary-container');
            container.innerHTML = '';
            const starredWords = getStarredWords();

            // 获取当前单元数据
            const unitsToRender = currentUnit === 'all' 
                ? vocabularyData 
                : [vocabularyData[parseInt(currentUnit)]];

            unitsToRender.forEach(unit => {
                const unitElement = document.createElement('div');
                unitElement.className = 'unit';
                unitElement.innerHTML = `<h2>${unit.unit}</h2>`;
                
                unit.categories.forEach(group => {
                    const groupElement = document.createElement('div');
                    groupElement.className = 'group';

                    const groupHeader = document.createElement('h3');
                    groupHeader.innerHTML = `${group.group} <span class="word-count">(${group.words.length}个词)</span>`;
                    groupElement.appendChild(groupHeader);

                    const wordList = document.createElement('div');
                    wordList.className = 'word-list';

                    group.words.forEach(word => {
                        const wordItem = document.createElement('div');
                        wordItem.className = 'word-item';
                        wordItem.dataset.word = word.en;
                        wordItem.dataset.cn = word.cn;

                        const wordEn = document.createElement('span');
                        wordEn.className = 'word-en';
                        wordEn.textContent = word.en;

                        const wordCn = document.createElement('span');
                        wordCn.className = 'word-cn';
                        wordCn.textContent = word.cn;

                        const starBtn = document.createElement('button');
                        starBtn.className = 'star-btn';
                        
                        // 加载本地存储的标星状态
                        const wordKey = word.en + '_' + word.cn;
                        if (starredWords[wordKey] === 'starred') {
                            wordItem.classList.add('starred');
                            starBtn.className = 'star-btn starred';
                            starBtn.innerHTML = '🌟';
                        } else if (starredWords[wordKey] === 'starred-double') {
                            wordItem.classList.add('starred-double');
                            starBtn.className = 'star-btn starred-double';
                            starBtn.innerHTML = '🌟🌟';
                        } else {
                            starBtn.innerHTML = '☆';
                        }
                        
                        starBtn.addEventListener('click', function() {
                            toggleStar(wordItem, starBtn);
                        });

                        wordItem.appendChild(wordEn);
                        wordItem.appendChild(wordCn);
                        wordItem.appendChild(starBtn);
                        wordList.appendChild(wordItem);
                    });

                    groupElement.appendChild(wordList);
                    unitElement.appendChild(groupElement);
                });
                container.appendChild(unitElement);
            });
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 单元选择
            document.getElementById('unit-select').addEventListener('change', function() {
                currentUnit = this.value;
                renderVocabulary();
            });

            // 模式切换
            document.getElementById('mode-normal').addEventListener('click', function() {
                setMode('normal');
            });

            document.getElementById('mode-hide-cn').addEventListener('click', function() {
                setMode('hide-cn');
            });

            // 过滤切换
            document.getElementById('filter-all').addEventListener('click', function() {
                setFilter('all');
            });

            document.getElementById('filter-starred').addEventListener('click', function() {
                setFilter('starred');
            });

            document.getElementById('filter-starred-single').addEventListener('click', function() {
                setFilter('starred-single');
            });

            document.getElementById('filter-starred-double').addEventListener('click', function() {
                setFilter('starred-double');
            });

            // 重置星标
            document.getElementById('reset-stars').addEventListener('click', function() {
                resetStars();
            });
        }

        // 设置模式
        function setMode(mode) {
            // 更新按钮状态
            document.getElementById('mode-normal').classList.remove('active');
            document.getElementById('mode-hide-cn').classList.remove('active');
            document.getElementById(`mode-${mode}`).classList.add('active');

            // 更新显示
            const wordCns = document.querySelectorAll('.word-cn');
            wordCns.forEach(cn => {
                if (mode === 'hide-cn') {
                    cn.classList.add('hidden');
                } else {
                    cn.classList.remove('hidden');
                }
            });
        }

        // 设置过滤
        function setFilter(filter) {
            // 更新按钮状态
            document.getElementById('filter-all').classList.remove('active');
            document.getElementById('filter-starred').classList.remove('active');
            document.getElementById('filter-starred-single').classList.remove('active');
            document.getElementById('filter-starred-double').classList.remove('active');
            document.getElementById(`filter-${filter}`).classList.add('active');

            // 更新显示
            const groups = document.querySelectorAll('.group');
            groups.forEach(group => {
                const wordItems = group.querySelectorAll('.word-item');
                let hasVisibleItems = false;

                wordItems.forEach(item => {
                    if (filter === 'all') {
                        item.style.display = 'flex';
                        hasVisibleItems = true;
                    } else if (filter === 'starred') {
                        if (item.classList.contains('starred') || item.classList.contains('starred-double')) {
                            item.style.display = 'flex';
                            hasVisibleItems = true;
                        } else {
                            item.style.display = 'none';
                        }
                    } else if (filter === 'starred-single') {
                        if (item.classList.contains('starred') && !item.classList.contains('starred-double')) {
                            item.style.display = 'flex';
                            hasVisibleItems = true;
                        } else {
                            item.style.display = 'none';
                        }
                    } else if (filter === 'starred-double') {
                        if (item.classList.contains('starred-double')) {
                            item.style.display = 'flex';
                            hasVisibleItems = true;
                        } else {
                            item.style.display = 'none';
                        }
                    }
                });

                // 隐藏没有可见项目的组
                group.style.display = hasVisibleItems ? 'block' : 'none';
            });
        }

        // 切换星标
        function toggleStar(wordItem, starBtn) {
            const wordEn = wordItem.dataset.word;
            const wordCn = wordItem.dataset.cn;
            const wordKey = wordEn + '_' + wordCn;
            const starredWords = getStarredWords();
            
            if (wordItem.classList.contains('starred-double')) {
                // 移除所有星标
                wordItem.classList.remove('starred-double');
                wordItem.classList.remove('starred');
                starBtn.className = 'star-btn';
                starBtn.innerHTML = '☆';
                delete starredWords[wordKey];
            } else if (wordItem.classList.contains('starred')) {
                // 升级为双星
                wordItem.classList.remove('starred');
                wordItem.classList.add('starred-double');
                starBtn.className = 'star-btn starred-double';
                starBtn.innerHTML = '🌟🌟';
                starredWords[wordKey] = 'starred-double';
            } else {
                // 添加单星
                wordItem.classList.add('starred');
                starBtn.className = 'star-btn starred';
                starBtn.innerHTML = '🌟';
                starredWords[wordKey] = 'starred';
            }
            
            // 保存到本地存储
            saveStarredWords(starredWords);
        }

        // 重置星标
        function resetStars() {
            const wordItems = document.querySelectorAll('.word-item');
            wordItems.forEach(item => {
                item.classList.remove('starred');
                item.classList.remove('starred-double');
            });

            const starBtns = document.querySelectorAll('.star-btn');
            starBtns.forEach(btn => {
                btn.className = 'star-btn';
                btn.innerHTML = '☆';
            });

            // 清空本地存储
            saveStarredWords({});

            // 确保显示所有项目
            setFilter('all');
        }

        // 监听数据同步事件
        document.addEventListener('dataSynced', function() {
            // 数据从云端同步后刷新页面
            renderVocabulary();
        });

        // 监听用户登录事件
        document.addEventListener('userLoggedIn', function() {
            // 用户登录后从云端同步数据
            syncDataFromCloud();
        });

        // 滚动隐藏/显示返回按钮
        let lastScrollTop = 0;
        const backBtn = document.querySelector('.back-btn');
        
        window.addEventListener('scroll', function() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > lastScrollTop && scrollTop > 100) {
                // 向下滚动且滚动距离超过100px
                backBtn.classList.add('hidden');
            } else {
                // 向上滚动或滚动距离小于100px
                backBtn.classList.remove('hidden');
            }
            
            lastScrollTop = scrollTop;
        });
    </script>
</body>
</html>
