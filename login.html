<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 雅思词汇学习中心</title>
    <!-- 自定义脚本 -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background: #0a1028;
            background-image: radial-gradient(circle at 50% 50%, #1a2345 0%, #050714 100%);
            color: #e6edf7;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 400px;
            margin: 80px auto;
            background: rgba(18, 28, 58, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(100, 120, 255, 0.2);
            padding: 40px;
            border: 1px solid rgba(130, 150, 255, 0.2);
        }

        .title {
            text-align: center;
            font-size: 24px;
            color: #c7d1ff;
            text-shadow: 0 0 15px rgba(130, 150, 255, 0.5);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aabbff;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(130, 150, 255, 0.3);
            background: rgba(26, 35, 69, 0.7);
            color: #e6edf7;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: rgba(130, 150, 255, 0.6);
            background: rgba(26, 35, 69, 0.9);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #6a85ff, #4a6cff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: linear-gradient(90deg, #5a75ff, #3a5cff);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: linear-gradient(90deg, #8899ff, #6677cc);
            margin-top: 15px;
        }

        .btn-secondary:hover {
            background: linear-gradient(90deg, #7788ee, #5566bb);
        }

        .error-message {
            background: rgba(255, 114, 114, 0.2);
            border: 1px solid rgba(255, 114, 114, 0.4);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: #ff7272;
            font-size: 14px;
            display: none;
        }

        .switch-form {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #aabbff;
        }

        .switch-form a {
            color: #6a85ff;
            text-decoration: none;
            transition: 0.3s;
        }

        .switch-form a:hover {
            color: #4a6cff;
            text-decoration: underline;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 24px;
            background: rgba(114, 137, 255, 0.2);
            color: #c7d1ff;
            border: 1px solid rgba(130, 150, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1000;
        }

        .back-btn:hover {
            background: rgba(114, 137, 255, 0.3);
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'">返回学习中心</button>
    <div class="container">
        <h1 class="title">🔐 用户登录</h1>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div id="loginForm">
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div style="position: relative;">
                    <input type="password" id="password" placeholder="请输入密码" required style="width: 100%; padding-right: 40px;">
                    <button type="button" onclick="togglePassword('password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aabbff; font-size: 18px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 16v-4"></path>
                            <path d="M12 8h.01"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="btn" id="loginBtn" onclick="handleLogin()">登录</button>
            <div class="switch-form">
                还没有账号？<a href="#" onclick="switchToRegister()">立即注册</a>
            </div>
        </div>
        
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="regEmail">邮箱地址</label>
                <input type="email" id="regEmail" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label for="regPassword">密码</label>
                <div style="position: relative;">
                    <input type="password" id="regPassword" placeholder="请输入密码（至少6位）" required style="width: 100%; padding-right: 40px;">
                    <button type="button" onclick="togglePassword('regPassword')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aabbff; font-size: 18px; z-index: 10;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 16v-4"></path>
                            <path d="M12 8h.01"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="regConfirmPassword">确认密码</label>
                <div style="position: relative;">
                    <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" required style="width: 100%; padding-right: 40px;">
                    <button type="button" onclick="togglePassword('regConfirmPassword')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aabbff; font-size: 18px; z-index: 10;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 16v-4"></path>
                            <path d="M12 8h.01"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="btn" id="registerBtn" onclick="handleRegister()">注册</button>
            <div class="switch-form">
                已有账号？<a href="#" onclick="switchToLogin()">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        // -------- UI 工具函数 --------
        function switchToRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.querySelector('.title').textContent = '📝 用户注册';
            clearError();
        }

        function switchToLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.querySelector('.title').textContent = '🔐 用户登录';
            clearError();
        }

        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.style.display = 'block';
        }

        function clearError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (!btn) return;
            btn.disabled = loading;
            btn.style.opacity = loading ? '0.6' : '1';
            btn.textContent = loading ? '请稍候...' : btn.dataset.label;
        }

        function togglePassword(id) {
            const input = document.getElementById(id);
            const button = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>';
            } else {
                input.type = 'password';
                button.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>';
            }
        }

        // -------- 登录 / 注册 --------
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showError('请填写邮箱和密码'); return; }

            setLoading('loginBtn', true);
            clearError();
            try {
                await loginUser(email, password);
                window.location.href = 'index.html';
            } catch (err) {
                showError(err.message);
                setLoading('loginBtn', false);
            }
        }

        async function handleRegister() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            if (!email || !password || !confirm) { showError('请填写所有必填字段'); return; }
            if (password.length < 6) { showError('密码长度至少为6位'); return; }
            if (password !== confirm) { showError('两次输入的密码不一致'); return; }

            setLoading('registerBtn', true);
            clearError();
            try {
                await registerUser(email, password);
                window.location.href = 'index.html';
            } catch (err) {
                showError(err.message);
                setLoading('registerBtn', false);
            }
        }

        // 已登录则直接跳转
        document.addEventListener('userLoggedIn', function() {
            window.location.href = 'index.html';
        });

        // 初始化按钮 data-label
        document.addEventListener('DOMContentLoaded', function() {
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');
            if (loginBtn) loginBtn.dataset.label = loginBtn.textContent;
            if (registerBtn) registerBtn.dataset.label = registerBtn.textContent;
        });
    </script>
</body>
</html>
