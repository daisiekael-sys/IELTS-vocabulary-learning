<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雅思词汇学习系统</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background: #0a1028;
            background-image: radial-gradient(circle at 50% 50%, #1a2345 0%, #050714 100%);
            color: #e6edf7;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            background: rgba(18, 28, 58, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(100, 120, 255, 0.2);
            padding: 40px;
            border: 1px solid rgba(130, 150, 255, 0.2);
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 2.5rem;
            color: #c7d1ff;
            text-shadow: 0 0 20px rgba(130, 150, 255, 0.5);
            margin-bottom: 16px;
        }

        .hero h2 {
            font-size: 1.3rem;
            color: #aabbff;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            margin-top: 30px;
        }

        .module-card {
            background: rgba(26, 35, 69, 0.6);
            border: 1px solid rgba(130, 150, 255, 0.2);
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .module-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(100, 120, 255, 0.3);
            border-color: rgba(130, 150, 255, 0.4);
        }

        .module-card .icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .module-card h3 {
            margin: 8px 0 16px;
            color: #c7d1ff;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(130, 150, 255, 0.3);
        }

        .module-card p {
            color: #aabbff;
            font-size: 1rem;
            line-height: 1.6;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .btn-start {
            margin-top: 18px;
            padding: 12px 32px;
            background: linear-gradient(90deg, #6a85ff, #4a6cff);
            color: #fff;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .module-card:hover .btn-start {
            background: linear-gradient(90deg, #5a75ff, #3a5cff);
            transform: scale(1.05);
        }

        .special-section {
            margin: 30px 0;
            padding: 30px 20px;
            background: rgba(26, 35, 69, 0.5);
            border: 1px solid rgba(130, 150, 255, 0.2);
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(100, 120, 255, 0.1);
        }

        .special-section h3 {
            color: #c7d1ff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(130, 150, 255, 0.3);
        }

        .special-section .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .special-section button {
            padding: 12px 24px;
            background: linear-gradient(90deg, #8899ff, #6677cc);
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(136, 153, 255, 0.3);
        }

        .special-section button:hover {
            background: linear-gradient(90deg, #7788ee, #5566bb);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(119, 136, 238, 0.4);
        }

        .user-auth {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #userInfo {
            display: none;
            color: #c7d1ff;
            font-size: 14px;
            font-weight: 500;
        }

        #loginBtn, #logoutBtn {
            padding: 10px 20px;
            background: linear-gradient(90deg, #6a85ff, #4a6cff);
            color: #ffffff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(106, 133, 255, 0.3);
        }

        #loginBtn:hover, #logoutBtn:hover {
            background: linear-gradient(90deg, #5a75ff, #3a5cff);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(90, 117, 255, 0.4);
        }

        #logoutBtn {
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 24px 0;
            color: #8a94a6;
            font-size: 0.9rem;
            border-top: 1px solid rgba(130, 150, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="user-auth">
                <span id="userInfo"></span>
                <button id="loginBtn" onclick="window.location.href='login.html'">🔐 登录/注册</button>
                <button id="logoutBtn" onclick="handleLogout()">🚪 登出</button>
            </div>
            <h1>🌌 雅思词汇学习中心</h1>
            <h2>选择适合你的词汇学习模式</h2>
        </div>

        <div class="module-grid">
            <a href="ebbinghaus.html" class="module-card">
                <div class="icon">📚</div>
                <h3>艾宾浩斯宇宙版</h3>
                <p>基于艾宾浩斯遗忘曲线的智能词汇记忆系统，包含科技、文化、工作等多个分类，帮助你高效记忆雅思词汇。</p>
                <button class="btn-start">开始训练</button>
            </a>

            <a href="synonyms.html" class="module-card">
                <div class="icon">🔄</div>
                <h3>高频同义替换</h3>
                <p>包含80多个词汇分组，提供高频同义替换和学术词汇，帮助你在写作中丰富表达，提升词汇多样性。</p>
                <button class="btn-start">开始学习</button>
            </a>


        </div>

        <div class="special-section" style="margin-top: 40px;">
            <h3>数据管理</h3>
            <div class="btn-group">
                <button onclick="exportData()">📤 导出学习数据</button>
                <button onclick="importData()">📥 导入学习数据</button>
                <button onclick="clearData()">🗑️ 清除所有数据</button>
            </div>
        </div>

        <div class="footer">
            © 2026 雅思词汇学习中心 | 架构设计：艾宾浩斯宇宙版
        </div>

        <script>
            // 数据管理功能
            function exportData() {
                try {
                    const data = localStorage.getItem('ielts_learning_system');
                    if (!data) {
                        alert('暂无学习数据可导出');
                        return;
                    }
                    
                    const blob = new Blob([data], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'ielts_learning_data_' + new Date().toISOString().slice(0, 10) + '.json';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    alert('数据导出成功！');
                } catch (error) {
                    console.error('Error exporting data:', error);
                    alert('数据导出失败，请重试');
                }
            }

            function importData() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const data = e.target.result;
                            localStorage.setItem('ielts_learning_system', data);
                            alert('数据导入成功！请刷新页面以应用更改');
                        } catch (error) {
                            console.error('Error importing data:', error);
                            alert('数据导入失败，请检查文件格式');
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            function clearData() {
                if (confirm('确定要清除所有学习数据吗？此操作不可恢复！')) {
                    try {
                        localStorage.removeItem('ielts_learning_system');
                        alert('数据已清除！请刷新页面');
                    } catch (error) {
                        console.error('Error clearing data:', error);
                        alert('数据清除失败，请重试');
                    }
                }
            }

            // 处理登出
            async function handleLogout() {
                try {
                    await logoutUser();
                    alert('登出成功！');
                } catch (error) {
                    console.error('Logout error:', error);
                    alert('登出失败，请重试');
                }
            }

            // 监听用户登录状态
            document.addEventListener('userLoggedIn', function(e) {
                const user = e.detail;
                document.getElementById('userInfo').textContent = `欢迎，${user.email}`;
                document.getElementById('userInfo').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'block';
            });

            document.addEventListener('userLoggedOut', function() {
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'none';
            });

            // 页面加载时检查认证状态
            window.addEventListener('load', function() {
                // 认证状态会在auth.js中自动检查
            });
        </script>
    </div>
</body>
</html>
