        // 存储结构 - 优化存储结构
        const STORAGE_KEY = 'ielts_learning_system';
        
        function getStorageData() {
            try {
                let d = localStorage.getItem(STORAGE_KEY);
                return d ? JSON.parse(d) : {
                    ebbinghaus: {
                        masterMap: {},
                        stats: {totalError: 0, totalMaster: 0},
                        errors: [],
                        memory: {}
                    },
                    synonyms: {
                        starred: {}
                    },
                    microbe: {
                        starred: {}
                    }
                };
            } catch (error) {
                console.error('Error getting storage data:', error);
                return {
                    ebbinghaus: {
                        masterMap: {},
                        stats: {totalError: 0, totalMaster: 0},
                        errors: [],
                        memory: {}
                    },
                    synonyms: {
                        starred: {}
                    },
                    microbe: {
                        starred: {}
                    }
                };
            }
        }
        
        function setStorageData(data) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                return true;
            } catch (error) {
                console.error('Error setting storage data:', error);
                return false;
            }
        }
        
        // 艾宾浩斯存储操作
        function getMasterMap() {
            const data = getStorageData();
            return data.ebbinghaus.masterMap || {};
        }
        
        function setMasterMap(m) {
            const data = getStorageData();
            data.ebbinghaus.masterMap = m;
            return setStorageData(data);
        }
        
        function getStats() {
            const data = getStorageData();
            return data.ebbinghaus.stats || {totalError: 0, totalMaster: 0};
        }
        
        function setStats(s) {
            const data = getStorageData();
            data.ebbinghaus.stats = s;
            return setStorageData(data);
        }
        
        function getErrorVocab() {
            const data = getStorageData();
            return data.ebbinghaus.errors || [];
        }
        
        function setErrorVocab(e) {
            const data = getStorageData();
            data.ebbinghaus.errors = e;
            return setStorageData(data);
        }
        
        function getMemoryData() {
            const data = getStorageData();
            return data.ebbinghaus.memory || {};
        }
        
        function setMemoryData(m) {
            const data = getStorageData();
            data.ebbinghaus.memory = m;
            return setStorageData(data);
        }

        let currentQ=0, rightNum=0, totalQ=0;

        // 刷新统计与进度
        function refreshAllProgress() {
            const master = getMasterMap();
            const st = getStats();
            const memoryData = getMemoryData();
            let allWords = [], catWords = [];
            Object.keys(vocabLib).forEach(t => vocabLib[t].forEach(w => allWords.push(w.cn+'_'+w.en)));
            
            const currentType = vocabType.value;
            if(currentType === 'mixed') {
                catWords = allWords;
            } else if(vocabLib[currentType]) {
                catWords = vocabLib[currentType].map(w => w.cn+'_'+w.en);
            }
            
            const allDone = allWords.filter(k => master[k]===1).length;
            const catDone = catWords.filter(k => master[k]===1).length;
            
            // 计算学习中的单词（已开始学习但未掌握）
            const learningWords = catWords.filter(k => !master[k] && memoryData[k]);
            const catLearning = learningWords.length;
            const catNew = catWords.length - catDone - catLearning;
            
            const catTotal = catWords.length;
            const catUndone = catTotal - catDone;
            const allTotal = allWords.length;
            const gPer = (allDone/allTotal)*100 || 0;
            globalProgressBar.style.width = gPer + '%';
            globalProgressText.textContent = `${allDone} / ${allTotal}`;
            categoryProgress.textContent = `当前分类：已掌握 ${catDone} · 学习中 ${catLearning} · 未学新词 ${catNew} · 总数 ${catTotal}`;
            statCurError.textContent = sessionErrors.length;
            statTotalError.textContent = st.totalError;
            statTotalMaster.textContent = st.totalMaster;
            
            // 更新词汇数量显示
            const vocabCount = document.getElementById('vocabCount');
            if(vocabCount) {
                vocabCount.textContent = `(${catDone}/${catTotal})`;
            }
            
            // 更新出题数量限制和提示
            const qNumInput = document.getElementById('qNum');
            const qNumHint = document.getElementById('qNumHint');
            if(qNumInput && qNumHint) {
                const maxAvailable = catUndone;
                qNumInput.max = maxAvailable;
                
                if(maxAvailable === 0) {
                    qNumHint.textContent = '该分类已全部掌握！';
                    qNumHint.style.display = 'inline';
                    qNumInput.disabled = true;
                } else if(maxAvailable < 10) {
                    qNumHint.textContent = `仅剩 ${maxAvailable} 个未掌握单词`;
                    qNumHint.style.display = 'inline';
                    qNumInput.disabled = false;
                    if(parseInt(qNumInput.value) > maxAvailable) {
                        qNumInput.value = maxAvailable;
                    }
                } else {
                    qNumHint.style.display = 'none';
                    qNumInput.disabled = false;
                }
            }
        }

        // 艾宾浩斯遗忘曲线复习间隔（天）
        const ebbinghausIntervals = [1, 2, 4, 7, 15, 30];

        // 获取需要复习的单词
        function getReviewWords(list) {
            const memoryData = getMemoryData();
            const now = Date.now();
            const reviewWords = [];
            const newWords = [];
            
            list.forEach(w => {
                const key = w.cn+'_'+w.en;
                const memory = memoryData[key];
                
                if (!memory || memory.nextReview <= now) {
                    // 错误次数越多，优先级越高
                    const priority = memory ? (10 - memory.stage) : 5;
                    reviewWords.push({...w, priority: priority, key: key});
                } else {
                    newWords.push(w);
                }
            });
            
            // 按优先级排序，优先级高的先复习
            reviewWords.sort((a, b) => b.priority - a.priority);
            return [...reviewWords, ...newWords];
        }

        // 渲染单词列表（标记已掌握）
        function renderList(list) {
            const m = getMasterMap();
            vocabList.innerHTML = '';
            list.forEach(item => {
                const key = item.cn+'_'+item.en;
                const div = document.createElement('div');
                div.className = 'vocab-item ' + (m[key] ? 'mastered' : '');
                div.innerHTML = `<span>${item.cn}</span><div><span>${item.en}</span><button class="icon-btn sound-btn">🔊</button></div>`;
                vocabList.appendChild(div);
            });
            vocabList.querySelectorAll('.sound-btn').forEach((btn,i) => btn.onclick = () => speak(list[i].en));
        }

        // 倒计时
        function startCountdown(sec) {
            clearInterval(memTimer);
            let r = sec;
            memCountdown.textContent = r;
            memProgress.style.width = '0%';
            paused = false; pauseBtn.textContent='⏸️';
            memTimer = setInterval(() => {
                if(paused) return;
                r--;
                memCountdown.textContent = r;
                memProgress.style.width = ((sec-r)/sec*100)+'%';
                if(r<=0) { clearInterval(memTimer); memStage.classList.remove('active'); startAnswer(); }
            },1000);
        }

        // 答题
        function startAnswer() {
            ansStage.classList.add('active');
            qTotal.textContent = totalQ;
            nextQ();
        }
        // 存储当前题目的blankIndex
        let currentBlankIndex = 0;

        function nextQ() {
            stopLoop();
            qInput.value=''; qInput.classList.remove('error'); qTip.classList.remove('active'); answerShow.classList.remove('active');
            while(testQueue.length>0) {
                const key = testQueue[0].cn+'_'+testQueue[0].en;
                if(masterMap[key]) testQueue.shift(); else break;
            }
            if(testQueue.length===0) { ansStage.classList.remove('active'); showResult(); return; }
            currentQ++; qIndex.textContent=currentQ;
            
            const cur = testQueue[0];
            const examType = document.getElementById('examType').value;
            
            if(examType === 'spelling' || (examType === 'mixed' && Math.random() > 0.5)) {
                // 拼写题
                qChinese.textContent = cur.cn;
                currentBlankIndex = -1;
            } else {
                // 填空题
                const en = cur.en;
                const words = en.split(' ');
                currentBlankIndex = Math.floor(Math.random() * words.length);
                const blanked = words.map((word, i) => i === currentBlankIndex ? '_____' : word).join(' ');
                qChinese.textContent = `${cur.cn} → ${blanked}`;
            }
            
            ansProgress.style.width = ((currentQ-1)/totalQ*100)+'%';
        }

        // 提交逻辑
        function submitAnswer() {
            if(testQueue.length === 0) {
                console.log('testQueue is empty');
                return;
            }
            
            const cur = testQueue[0];
            if(!cur || !cur.cn || !cur.en) {
                console.log('Invalid testQueue item:', cur);
                return;
            }
            
            const key = cur.cn+'_'+cur.en;
            const val = qInput.value.trim().toLowerCase();
            const examType = document.getElementById('examType').value;
            let target;
            
            if(examType === 'spelling' || currentBlankIndex === -1) {
                // 拼写题：输入整个短语
                target = cur.en.trim().toLowerCase();
            } else {
                // 填空题：输入被挖空的单词
                const words = cur.en.split(' ');
                target = words[currentBlankIndex].toLowerCase();
            }
            
            if(val === target) {
                rightNum++;
                updateMemoryData(cur, true);
                if(!masterMap[key]) {
                    const memoryData = getMemoryData();
                    const memory = memoryData[key] || {stage: 0, correctStreak: 0};
                    if(memory.correctStreak >= 3) { // 连续答对3次以上才算掌握
                        masterMap[key]=1;
                        stats.totalMaster++;
                        setMasterMap(masterMap);
                    }
                }
                const errIdx = sessionErrors.findIndex(x => x.cn+'_'+x.en===key);
                if(errIdx>-1) sessionErrors.splice(errIdx,1);
                testQueue.shift();
                refreshAllProgress();
                nextQ();
            } else {
                updateMemoryData(cur, false);
                qInput.classList.add('error'); qTip.classList.add('active');
                answerShow.querySelector('span').textContent = `✅ ${cur.en}`;
                answerShow.classList.add('active'); speak(cur.en);
                ansPlayBtn.onclick=()=>speak(cur.en);
                loopBtn.onclick=()=>loopMode?stopLoop():startLoop(cur.en);
                if(!sessionErrors.some(x=>x.cn+'_'+x.en===key)) sessionErrors.push(cur);
                refreshAllProgress();
            }
        }

        // 循环播放
        function startLoop(text) {
            loopMode=true;
            loopBtn.classList.add('active');
            loopBtn.textContent='⏹️';
            speak(text);
            loopTimer = setInterval(() => speak(text), 2000);
        }
        function stopLoop() {
            loopMode=false;
            loopBtn.classList.remove('active');
            loopBtn.textContent='🔁';
            clearInterval(loopTimer);
            window.speechSynthesis.cancel();
        }

        // 显示结果
        function showResult() {
            resStage.classList.add('active');
            resTotal.textContent = totalQ;
            resRight.textContent = rightNum;
            resRate.textContent = totalQ>0 ? Math.round(rightNum/totalQ*100)+'%' : '0%';
            
            const errorList = document.getElementById('errorList');
            if(sessionErrors.length>0) {
                errorList.innerHTML = sessionErrors.map(w => `<div>${w.cn} → <b>${w.en}</b></div>`).join('');
                // 保存错题
                const oldErrors = getErrorVocab();
                const newErrors = [...oldErrors, ...sessionErrors];
                // 去重（保留最新的）
                const uniqueErrors = [];
                const seen = new Set();
                newErrors.reverse().forEach(w => {
                    const key = w.cn+'_'+w.en;
                    if(!seen.has(key)) {
                        seen.add(key);
                        uniqueErrors.unshift(w);
                    }
                });
                setErrorVocab(uniqueErrors);
                stats.totalError += sessionErrors.length;
                setStats(stats);
            } else {
                errorList.textContent = '暂无错题';
            }
        }

        // 复习错题
        function review() {
            init();
            const errors = getErrorVocab();
            if(errors.length===0) {
                alert('暂无错题可复习');
                return;
            }
            const need = Math.min(Number(qNum.value)||10, errors.length);
            currentList = errors.slice(0, need);
            testQueue = [...currentList];
            totalQ = testQueue.length;
            renderList(currentList);
            memStage.classList.add('active');
            startCountdown(Number(memTime.value)||60);
        }

        // 开始
        function start() {
            init();
            const type = vocabType.value;
            let list;
            
            if(type === 'mixed') {
                // 混合类：从所有类型中抽取单词
                list = [];
                Object.keys(vocabLib).forEach(t => {
                    list = list.concat(vocabLib[t]);
                });
            } else {
                list = vocabLib[type];
            }
            
            const m = getMasterMap();
            
            // 背诵板块只显示未掌握的单词
            const unmastered = list.filter(w => !m[w.cn+'_'+w.en]);
            const reviewList = getReviewWords(unmastered);
            const need = Math.min(Number(qNum.value)||10, reviewList.length);
            const pick = reviewList.slice(0, need);
            
            currentList = pick;
            testQueue = [...pick];
            totalQ = testQueue.length;
            renderList(pick);
            memStage.classList.add('active');
            startCountdown(Number(memTime.value)||120);
        }

        // 事件绑定
        startBtn.onclick = start;
        reviewBtn.onclick = review;
        submitBtn.onclick = submitAnswer;
        skipBtn.onclick = () => { testQueue.shift(); nextQ(); };
        pauseBtn.onclick = function() {
            paused = !paused;
            this.textContent = paused ? '▶️' : '⏸️';
        };
        skipMemBtn.onclick = function() {
            clearInterval(memTimer);
            memStage.classList.remove('active');
            startAnswer();
        };
        backToConfigFromMem.onclick = backToMemFromAns.onclick = init;
        restartBtn.onclick = start;
        changeTypeBtn.onclick = init;
        qInput.addEventListener('keydown', e => {
            if(e.key === 'Enter') submitAnswer();
        });

        // 更新记忆数据
        function updateMemoryData(word, isCorrect) {
            const memoryData = getMemoryData();
            const key = word.cn+'_'+word.en;
            const memory = memoryData[key] || {stage: 0, nextReview: 0, correctStreak: 0};
            
            if (isCorrect) {
                memory.correctStreak = (memory.correctStreak || 0) + 1;
                memory.stage = Math.min(memory.stage + 1, ebbinghausIntervals.length - 1);
                const interval = ebbinghausIntervals[memory.stage] * 24 * 60 * 60 * 1000; // 转换为毫秒
                memory.nextReview = Date.now() + interval;
            } else {
                memory.correctStreak = 0;
                memory.stage = Math.max(memory.stage - 1, 0);
                memory.nextReview = Date.now(); // 立即复习
            }
            
            memoryData[key] = memory;
            setMemoryData(memoryData);
        }

        // 初始化
        function init() {
            clearInterval(memTimer); stopLoop();
            memStage.classList.remove('active'); ansStage.classList.remove('active'); resStage.classList.remove('active');
            currentQ=rightNum=0; testQueue=[]; sessionErrors=[];
            masterMap = getMasterMap(); stats=getStats();
            memProgress.style.width='0%'; ansProgress.style.width='0%';
        }

        // 监听数据同步事件
        document.addEventListener('dataSynced', function() {
            // 数据从云端同步后刷新页面数据
            masterMap = getMasterMap();
            stats = getStats();
            refreshAllProgress();
        });

        // 监听用户登录事件
        document.addEventListener('userLoggedIn', function() {
            // 用户登录后从云端同步数据
            syncDataFromCloud();
        });

        // 初始化
        vocabType.onchange = refreshAllProgress;
        startBtn.onclick = start;
        reviewBtn.onclick = review;
        qInput.addEventListener('keydown',e=>{if(e.key==='Enter')submitAnswer();});
        
        // 出题数量输入验证
        qNum.addEventListener('input', function() {
            const max = parseInt(this.max) || 10;
            const val = parseInt(this.value) || 1;
            if(val > max) {
                this.value = max;
            } else if(val < 1) {
                this.value = 1;
            }
        });
        
        // 滚动隐藏/显示返回按钮
        let lastScrollTop = 0;
        const backBtn = document.querySelector('.back-btn');
        
        window.addEventListener('scroll', function() {
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > lastScrollTop && scrollTop > 100) {
                // 向下滚动且滚动距离超过100px
                backBtn.classList.add('hidden');
            } else {
                // 向上滚动或滚动距离小于100px
                backBtn.classList.remove('hidden');
            }
            
            lastScrollTop = scrollTop;
        });
        
        refreshAllProgress();
    </script>
</body>
</html>
