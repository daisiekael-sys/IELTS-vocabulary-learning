# Firebase Hosting 预览 - PR 时自动部署预览版本
# 项目为纯静态文件，无需构建步骤

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create firebase-config.js from secret
        run: echo "${{ secrets.FIREBASE_CONFIG_JS }}" > public/firebase-config.js
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SYNONYMOUS_SUBSTITUTIONS }}
          projectId: synonymous-substitutions
